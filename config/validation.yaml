# Oracle Validator - Validation Configuration

schemas:
  - source: SOURCE_SCHEMA
    target: TARGET_SCHEMA
  # - source: FINANCE
  #   target: FINANCE_NEW

modules:
  inventory: true
  tables: true
  indexes: true
  constraints: true
  sequences: true
  grants: false

  code_objects:
    enabled: false
    # Kontrol edilecek obje tipleri (boş bırakılırsa hepsi)
    types:
      - FUNCTION
      - PROCEDURE
      - PACKAGE
      - PACKAGE BODY
      - TRIGGER
      - TYPE
      - TYPE BODY
    normalize_whitespace: false   # DDL karşılaştırmasında whitespace ignore

row_count:
  mode: auto           # auto | exact | sample | stats | skip
  sample_pct: 1        # SAMPLE(x) için yüzde — auto modda da kullanılır
  timeout_sec: 30      # Bu süreyi aşan sorgular TIMEOUT olarak işaretlenir
  parallel_degree: 0   # TEK SORGU İÇİ Oracle hint: 0 = yok, >0 = /*+ PARALLEL(t, N) */
  # parallel_workers: TABLOLAR ARASI eşzamanlılık (parallel_degree'den farklı!).
  #   1 = seri (varsayılan). >1 → exact/sample sayımları ThreadPoolExecutor + bağlantı
  #   havuzu ile paralel çalışır. Havuz boyutu = worker sayısı.
  parallel_workers: 1
  # source_max_workers: source (production 11g) havuzu için ayrı, daha düşük tavan.
  #   Etkin source worker = min(parallel_workers, source_max_workers). Production'ı
  #   eşzamanlı COUNT(*) yükünden korur; target tam parallel_workers hızında sayılır.
  source_max_workers: 4
  refresh_stats: false # COUNT öncesi DBMS_STATS.GATHER_TABLE_STATS çalıştır
  stats_max_age_days: 7  # İstatistik bu kadar günden eskiyse WARNING ver
  # Tablo bazlı override — belirli tabloları atlamak veya mod değiştirmek için
  overrides: {}
  # overrides:
  #   AUDIT_LOG: skip
  #   ORDERS: sample

  # auto mod için eşik değerleri (num_rows bazlı)
  auto_thresholds:
    exact_below: 1_000_000       # < 1M  → exact COUNT(*)
    sample_below: 100_000_000    # < 100M → SAMPLE ile tahmin
    # >= 100M → stats kullan

# ---------------------------------------------------------------------------
# DDL Script Üretimi — target'ta eksik objelerin create scriptlerini yazar
# ---------------------------------------------------------------------------
generate_scripts:
  enabled: false                # true yapınca --generate-missing ile aktif olur
  output_dir: ./ddl_output      # scriptlerin yazılacağı klasör
  only_missing: true            # sadece target'ta eksik olanlar (false = tümü)
  replace_schema: true          # DDL içinde source schema adını target ile değiştir
  include_invalid: false        # INVALID durumdaki objeleri de üret (WARNING eklenir)

  # Obje tipi bazında açma/kapama
  types:
    SEQUENCE:  true
    FUNCTION:  true
    PROCEDURE: true
    PACKAGE:   true             # PACKAGE BODY ayrı dosyada otomatik üretilir
    TRIGGER:   true
    TYPE:      true             # TYPE BODY ayrı dosyada otomatik üretilir
    SYNONYM:   false
    GRANT:     true             # source schema üzerindeki object grant'ları

ignore_differences:
  lob_storage: true        # BASICFILE vs SECUREFILE — WARNING değil, ignore
  segment_creation: true   # DEFERRED vs IMMEDIATE
  tablespace: true         # Tablespace farklarını ignore et
  index_compression: true  # Index compression farklarını ignore et

# ---------------------------------------------------------------------------
# Loglama / debug
#   Dosya logu HER ZAMAN üretilir (debug bayrağı gerekmez).
#
#   log_level: INFO | WARNING | ERROR — HEM dosyanın HEM canlı ekranın eşiği:
#              INFO    = her şey (PASS dahil)
#              WARNING = warning + timeout + fail + error
#              ERROR   = yalnızca fail + error   ← sadece sorunları görmek için
#              (CLI'dan --log-level ile override edilebilir.)
#   enabled: true → EK OLARAK canlı stderr akışı açılır; her obje için
#                   "ŞEMA.OBJE  source=..  target=..  STATUS" satırı anlık basılır
#                   (aynı log_level eşiğiyle). CLI'dan --debug ile de açılabilir.
#   log_file: boş → ./logs/dataval_<zaman>.log otomatik üretilir.
# ---------------------------------------------------------------------------
debug:
  enabled: false
  log_file: ""
  log_level: INFO    # yalnızca sorunları loglamak için: ERROR
